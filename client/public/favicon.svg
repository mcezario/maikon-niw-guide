<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 13 stripes -->
  <rect width="32" height="32" fill="#B22234"/>
  <rect y="2.46" width="32" height="2.46" fill="#FFFFFF"/>
  <rect y="4.92" width="32" height="2.46" fill="#B22234"/>
  <rect y="7.38" width="32" height="2.46" fill="#FFFFFF"/>
  <rect y="9.85" width="32" height="2.46" fill="#B22234"/>
  <rect y="12.31" width="32" height="2.46" fill="#FFFFFF"/>
  <rect y="14.77" width="32" height="2.46" fill="#B22234"/>
  <rect y="17.23" width="32" height="2.46" fill="#FFFFFF"/>
  <rect y="19.69" width="32" height="2.46" fill="#B22234"/>
  <rect y="22.15" width="32" height="2.46" fill="#FFFFFF"/>
  <rect y="24.62" width="32" height="2.46" fill="#B22234"/>
  <rect y="27.08" width="32" height="2.46" fill="#FFFFFF"/>
  <!-- Blue canton -->
  <rect width="13" height="17.23" fill="#3C3B6E"/>
  <!-- Stars: 5 rows of 3, 4 rows of 2 alternating (simplified 9 stars) -->
  <g fill="#FFFFFF" font-size="2">
    <!-- Row 1 (3 stars) -->
    <circle cx="2.2" cy="1.8" r="0.9"/>
    <circle cx="6.5" cy="1.8" r="0.9"/>
    <circle cx="10.8" cy="1.8" r="0.9"/>
    <!-- Row 2 (2 stars) -->
    <circle cx="4.3" cy="3.9" r="0.9"/>
    <circle cx="8.6" cy="3.9" r="0.9"/>
    <!-- Row 3 (3 stars) -->
    <circle cx="2.2" cy="6.0" r="0.9"/>
    <circle cx="6.5" cy="6.0" r="0.9"/>
    <circle cx="10.8" cy="6.0" r="0.9"/>
    <!-- Row 4 (2 stars) -->
    <circle cx="4.3" cy="8.1" r="0.9"/>
    <circle cx="8.6" cy="8.1" r="0.9"/>
    <!-- Row 5 (3 stars) -->
    <circle cx="2.2" cy="10.2" r="0.9"/>
    <circle cx="6.5" cy="10.2" r="0.9"/>
    <circle cx="10.8" cy="10.2" r="0.9"/>
    <!-- Row 6 (2 stars) -->
    <circle cx="4.3" cy="12.3" r="0.9"/>
    <circle cx="8.6" cy="12.3" r="0.9"/>
    <!-- Row 7 (3 stars) -->
    <circle cx="2.2" cy="14.4" r="0.9"/>
    <circle cx="6.5" cy="14.4" r="0.9"/>
    <circle cx="10.8" cy="14.4" r="0.9"/>
  </g>
</svg>
